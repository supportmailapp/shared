name: Publish to GitHub Packages

on:
  push:
    tags:
      - '*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 1.2.3)"
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 11.15.1

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://npm.pkg.github.com/
          scope: "@supportmailapp"

      - run: pnpm install --frozen-lockfile

      # Manual dispatch with a version input overrides package.json for this
      # run only. On a normal release, publish the committed package.json version as-is.
      - if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version != '' }}
        run: pnpm version --no-git-tag-version "${{ github.event.inputs.version }}"

      - run: pnpm build

      - run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
