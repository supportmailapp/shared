name: Publish to GitHub Packages

on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.15.1

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://npm.pkg.github.com/
          scope: "@supportmailapp"

      - run: pnpm install --frozen-lockfile

      # Tag drives the published version: v0.1.0 -> 0.1.0. package.json version
      # in git is ignored, so no manual bump/commit per release.
      - run: pnpm version --no-git-tag-version "${GITHUB_REF_NAME#v}"

      - run: pnpm build

      # tsdown regenerates package.json exports on build — publish the built copy as-is.
      - run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
