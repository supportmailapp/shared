name: Publish to GitHub Packages

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 1.2.3)"
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 11.15.1

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://npm.pkg.github.com/
          scope: "@supportmailapp"

      - run: pnpm install --frozen-lockfile

      # Tag drives the published version: v0.1.0 -> 0.1.0. package.json version
      # in git is ignored, so no manual bump/commit per release.
      - if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version != '' }}
        run: pnpm version --no-git-tag-version "${{ github.event.inputs.version }}"

      - run: pnpm build

      # tsdown regenerates package.json exports on build — publish the built copy as-is.
      - run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
